services:
  backend:
    build:
      context: .
      dockerfile: ScentMarekt.Server/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5109:8080"

  frontend:
    build:
      context: .
      dockerfile: ScentMarket.Client/Dockerfile
    depends_on:
      - backend
    ports:
      - "5059:80"

