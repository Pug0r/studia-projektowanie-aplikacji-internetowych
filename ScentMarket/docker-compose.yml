services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: scentmarket
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d scentmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ScentMarekt.Server/Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=database;Port=5432;Database=scentmarket;Username=admin;Password=admin
    ports:
      - "5109:8080"

  frontend:
    build:
      context: .
      dockerfile: ScentMarket.Client/Dockerfile
    depends_on:
      - backend
    ports:
      - "5059:80"

